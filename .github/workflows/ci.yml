name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update dependencies
        run: |
          moon version --all
          moon update

      - name: moon check --deny-warn
        run: moon check --deny-warn

      - name: moon fmt --check
        run: moon fmt --check

      - name: moon info
        run: moon info

      - name: moon test --deny-warn
        run: moon test --deny-warn
